<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/index.css">
        <script type="module" src="js/register.js"></script>
    </head>
    
    <body>
        <aside class="description_sidebar">
            <div class="logo_container">
                <h1 class="logo_name">FlaXat</h1>
                <p class="logo_description">Join Our Vibrant Community!</p>
            </div>
        </aside>

        <main class="main_container">
            <div class="auth_container">
                <h2 class="auth_title">Register Into FlaXat</h2>
                
                <form class="auth_form" id="register_auth" action="#" method="POST">
                    <div id="error_message" class="error_message"></div>
                    <div class="input_group">
                        <input type="text" id="username" class="form_input" placeholder="Username" required>
                    </div>

                    <div class="input_group">
                        <input type="email" id="email" class="form_input" placeholder="Email" required>
                    </div>

                    <div class="input_group">
                        <input type="password" id="password" class="form_input" placeholder="Password" required>
                    </div>

                    <div class="input_group">
                        <input type="password" id="confirmPassword" class="form_input" placeholder="Confirm Password" required>
                    </div>

                    <div class="button_container">
                        <button type="submit" class="btn btn_primary" id="submitButton" style="font-family: monospace;">Register</button>
                        <a href="index.html" class="btn btn_secondary">Return To Main Page</a>
                    </div>
                </form>
            </div>
        </main>
    </body>
</html>
